<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fund Monitor · 基金追踪</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F7F5; font-family: 'DM Mono', 'Courier New', monospace; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  select option { background: #fff; color: #1A1A18; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { PieChart, Pie, Cell, XAxis, YAxis, Tooltip, ResponsiveContainer, AreaChart, Area } = Recharts;

// ─── localStorage 存储 ────────────────────────────────────────────────────────
function load(key) {
  try { const v = localStorage.getItem("fm_" + key); return v ? JSON.parse(v) : null; }
  catch { return null; }
}
function save(key, val) {
  try { localStorage.setItem("fm_" + key, JSON.stringify(val)); } catch {}
}

// ─── 天天基金 JSONP ────────────────────────────────────────────────────────────
function fetchFundNav(code) {
  return new Promise((resolve, reject) => {
    const cbName = `_fcb_${code}_${Date.now()}`;
    const timer = setTimeout(() => {
      delete window[cbName];
      if (script.parentNode) script.remove();
      reject(new Error("timeout"));
    }, 8000);
    window[cbName] = (data) => {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.remove();
      if (data && data.fundcode) {
        const nav = parseFloat(data.gsz) || parseFloat(data.dwjz) || null;
        const isEstimate = !!(parseFloat(data.gsz) && data.gszzl);
        resolve({ nav, name: data.name, date: data.jzrq, isEstimate });
      } else { reject(new Error("no data")); }
    };
    const script = document.createElement("script");
    script.src = `https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}&callback=${cbName}`;
    script.onerror = () => { clearTimeout(timer); delete window[cbName]; reject(new Error("network")); };
    document.head.appendChild(script);
  });
}

// ─── 设计 token ───────────────────────────────────────────────────────────────
const COLORS = ["#7BA7BC","#A8C5A0","#D4956A","#E8D5B0","#C5A8C5","#8FB8AD","#E8B4B0","#B0C5E8"];
const C = {
  bg:"#F7F7F5", card:"#FFFFFF", border:"#E4E4DF",
  accent:"#3A6B3A", accentDim:"#EAF2EA",
  text:"#1A1A18", muted:"#8A8A80",
  red:"#C0392B", green:"#2E7D32", gold:"#B8860B", blue:"#2563A8",
};
const STATUS = {
  loading: { label:"拉取中…", color: C.blue },
  ok:      { label:"已更新",  color: C.green },
  estimate:{ label:"盘中估值", color: C.gold },
  error:   { label:"拉取失败", color: C.red },
};
const fmt = (n, d=2) => (typeof n === "number" ? n.toLocaleString("zh-CN",{minimumFractionDigits:d,maximumFractionDigits:d}) : "--");
const fmtPct = (n) => `${n>=0?"+":""}${fmt(n)}%`;
const todayStr = () => new Date().toLocaleDateString("zh-CN",{month:"2-digit",day:"2-digit"}).replace("/","-");
const emptyFund = () => ({ id:Date.now().toString(), code:"", name:"", type:"A股公募", buyAmount:"", costNav:"", currentNav:"", history:[] });

// ═══════════════════════════ APP ════════════════════════════════════════════
function App() {
  const [funds, setFunds] = useState([]);
  const [portfolioHistory, setPortfolioHistory] = useState([]);
  const [view, setView] = useState("dashboard");
  const [activeFund, setActiveFund] = useState(null);
  const [form, setForm] = useState(emptyFund());
  const [navUpdateId, setNavUpdateId] = useState(null);
  const [navInput, setNavInput] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [fetchStatus, setFetchStatus] = useState({});

  // 加载
  useEffect(() => {
    const f = load("funds");
    const ph = load("portfolioHistory");
    if (f) setFunds(f);
    if (ph) setPortfolioHistory(ph);
    setLoaded(true);
  }, []);

  // 持久化
  useEffect(() => { if (loaded) save("funds", funds); }, [funds, loaded]);
  useEffect(() => { if (loaded) save("portfolioHistory", portfolioHistory); }, [portfolioHistory, loaded]);

  // ─── 自动拉净值 ──────────────────────────────────────────────────────────
  const autoFetchAll = useCallback(async (override) => {
    const src = override ?? funds;
    const targets = src.filter(f => /^\d{6}$/.test(f.code));
    if (!targets.length) return;
    const td = todayStr();
    setFetchStatus(prev => {
      const next = {...prev};
      targets.forEach(f => { next[f.id] = "loading"; });
      return next;
    });
    const results = await Promise.allSettled(targets.map(f => fetchFundNav(f.code)));
    setFunds(prev => prev.map(fund => {
      const i = targets.findIndex(t => t.id === fund.id);
      if (i === -1) return fund;
      const res = results[i];
      if (res.status === "fulfilled" && res.value?.nav) {
        const { nav, name: fn, isEstimate } = res.value;
        const hist = [...(fund.history || [])];
        const last = hist[hist.length-1];
        if (last?.date === td) hist[hist.length-1] = {date:td,nav};
        else hist.push({date:td,nav});
        setFetchStatus(p => ({...p, [fund.id]: isEstimate?"estimate":"ok"}));
        return {...fund, currentNav:String(nav), history:hist, name: fund.name||fn||fund.name};
      }
      setFetchStatus(p => ({...p, [fund.id]: "error"}));
      return fund;
    }));
  }, [funds]);

  useEffect(() => {
    if (loaded && funds.length > 0) autoFetchAll(funds);
  }, [loaded]);

  // ─── 计算 ────────────────────────────────────────────────────────────────
  const stats = funds.map(f => {
    const buy = parseFloat(f.buyAmount)||0;
    const cost = parseFloat(f.costNav)||1;
    const cur = parseFloat(f.currentNav)||cost;
    const shares = buy/cost;
    const curValue = shares*cur;
    return {...f, buy, cost, cur, shares, curValue, pnl:curValue-buy, pnlPct:((cur-cost)/cost)*100};
  });
  const totalBuy = stats.reduce((s,f)=>s+f.buy,0);
  const totalValue = stats.reduce((s,f)=>s+f.curValue,0);
  const totalPnl = totalValue-totalBuy;
  const totalPnlPct = totalBuy>0?(totalPnl/totalBuy)*100:0;

  // 快照总资产
  useEffect(() => {
    if (!loaded || totalValue===0) return;
    const td = todayStr();
    setPortfolioHistory(prev => {
      const arr = [...prev];
      const snap = {date:td, value:totalValue};
      if (arr[arr.length-1]?.date===td) arr[arr.length-1]=snap; else arr.push(snap);
      return arr.slice(-90);
    });
  }, [totalValue, loaded]);

  // ─── 增删改 ──────────────────────────────────────────────────────────────
  const openAdd = () => { setForm(emptyFund()); setView("add"); };
  const openEdit = (f) => { setForm({...f}); setView("edit"); };
  const saveFund = () => {
    if (!form.name || !form.buyAmount || !form.costNav) return;
    const entry = {
      ...form,
      currentNav: form.currentNav||form.costNav,
      history: form.history?.length ? form.history : [{date:todayStr(),nav:parseFloat(form.costNav)}]
    };
    if (view==="add") {
      setFunds(prev => [...prev, entry]);
      setTimeout(() => autoFetchAll([entry]), 200);
    } else {
      setFunds(prev => prev.map(f => f.id===entry.id ? entry : f));
    }
    setView("dashboard");
  };
  const deleteFund = (id) => { if (window.confirm("确认删除这只基金？")) setFunds(prev => prev.filter(f => f.id!==id)); };

  // ─── 手动更新净值 ─────────────────────────────────────────────────────────
  const confirmNavUpdate = (id) => {
    const val = parseFloat(navInput);
    if (!val) return;
    const td = todayStr();
    setFunds(prev => prev.map(f => {
      if (f.id!==id) return f;
      const hist = [...(f.history||[])];
      const last = hist[hist.length-1];
      if (last?.date===td) hist[hist.length-1]={date:td,nav:val}; else hist.push({date:td,nav:val});
      return {...f, currentNav:String(val), history:hist};
    }));
    setNavUpdateId(null); setNavInput("");
  };

  if (!loaded) return <div style={{background:C.bg,height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.muted}}>加载中…</div>;

  if (view==="detail" && activeFund) {
    const f = stats.find(s=>s.id===activeFund);
    if (!f) { setView("dashboard"); return null; }
    return <DetailView fund={f} onBack={()=>setView("dashboard")} onEdit={()=>openEdit(f)}
      navUpdateId={navUpdateId} navInput={navInput} setNavInput={setNavInput}
      setNavUpdateId={setNavUpdateId} confirmNavUpdate={confirmNavUpdate}
      fetchStatus={fetchStatus} onAutoFetch={()=>autoFetchAll([f])} />;
  }
  if (view==="add"||view==="edit") {
    return <FormView form={form} setForm={setForm} onSave={saveFund} onCancel={()=>setView("dashboard")} isEdit={view==="edit"}/>;
  }
  return <Dashboard stats={stats} totalBuy={totalBuy} totalValue={totalValue}
    totalPnl={totalPnl} totalPnlPct={totalPnlPct} portfolioHistory={portfolioHistory}
    onAdd={openAdd} onEdit={openEdit} onDelete={deleteFund}
    onDetail={id=>{setActiveFund(id);setView("detail");}}
    navUpdateId={navUpdateId} navInput={navInput} setNavInput={setNavInput}
    setNavUpdateId={setNavUpdateId} confirmNavUpdate={confirmNavUpdate}
    fetchStatus={fetchStatus} onAutoFetch={()=>autoFetchAll()} />;
}

// ═══════════════════════════ DASHBOARD ═════════════════════════════════════
function Dashboard({stats,totalBuy,totalValue,totalPnl,totalPnlPct,portfolioHistory,onAdd,onEdit,onDelete,onDetail,navUpdateId,navInput,setNavInput,setNavUpdateId,confirmNavUpdate,fetchStatus,onAutoFetch}) {
  const pieData = stats.filter(f=>f.curValue>0).map(f=>({name:f.name||f.code,value:parseFloat(f.curValue.toFixed(2))}));
  const isPos = totalPnl>=0;
  const anyLoading = Object.values(fetchStatus).some(v=>v==="loading");

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Mono','Courier New',monospace",paddingBottom:80}}>
      {/* 顶栏 */}
      <div style={{padding:"32px 24px 0",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:6}}>基金追踪</div>
            <div style={{fontSize:26,fontWeight:300,letterSpacing:-0.5,color:C.text}}>Fund Monitor</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",marginTop:4}}>
            <button onClick={onAutoFetch} disabled={anyLoading} style={btn(C.accentDim,C.accent,true,anyLoading)}>
              {anyLoading?"⟳ 更新中…":"⟳ 自动更新"}
            </button>
            <button onClick={onAdd} style={btn(C.accent,"#fff")}>+ 添加</button>
          </div>
        </div>
        {/* 总览数字 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",marginTop:28}}>
          {[
            {label:"总投入",val:`¥${fmt(totalBuy)}`},
            {label:"当前市值",val:`¥${fmt(totalValue)}`,hi:true},
            {label:"总盈亏",val:fmtPct(totalPnlPct),sub:`${totalPnl>=0?"+":""}¥${fmt(totalPnl)}`,color:isPos?C.green:C.red},
          ].map((item,i)=>(
            <div key={i} style={{padding:"20px 0",borderLeft:i>0?`1px solid ${C.border}`:"none",paddingLeft:i>0?20:0}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>{item.label}</div>
              <div style={{fontSize:item.hi?20:16,color:item.color||C.text,fontWeight:item.hi?600:300}}>{item.val}</div>
              {item.sub&&<div style={{fontSize:11,color:item.color,marginTop:2}}>{item.sub}</div>}
            </div>
          ))}
        </div>
      </div>

      {stats.length===0 ? (
        <div style={{textAlign:"center",padding:"80px 24px",color:C.muted}}>
          <div style={{fontSize:40,marginBottom:16}}>◎</div>
          <div style={{fontSize:14}}>还没有持仓</div>
          <div style={{fontSize:12,marginTop:8}}>点击右上角「+ 添加」，填入6位基金代码可自动拉取净值</div>
        </div>
      ) : (
        <>
          {/* 图表区 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,margin:"1px 0",background:C.border}}>
            <div style={{background:C.card,padding:20}}>
              <div style={sLabel}>仓位占比</div>
              <ResponsiveContainer width="100%" height={160}>
                <PieChart>
                  <Pie data={pieData} cx="50%" cy="50%" innerRadius={45} outerRadius={72} paddingAngle={2} dataKey="value">
                    {pieData.map((_,i)=><Cell key={i} fill={COLORS[i%COLORS.length]} stroke="none"/>)}
                  </Pie>
                  <Tooltip formatter={v=>`¥${fmt(v)}`} contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:4,fontSize:11}}/>
                </PieChart>
              </ResponsiveContainer>
              <div style={{display:"flex",flexWrap:"wrap",gap:"4px 10px",marginTop:4}}>
                {pieData.map((d,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:C.muted}}>
                    <span style={{width:7,height:7,borderRadius:1,background:COLORS[i%COLORS.length],display:"inline-block"}}/>
                    {d.name}
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:C.card,padding:20}}>
              <div style={sLabel}>总资产走势</div>
              {portfolioHistory.length>1 ? (
                <ResponsiveContainer width="100%" height={160}>
                  <AreaChart data={portfolioHistory} margin={{top:4,right:0,left:-20,bottom:0}}>
                    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%" stopColor={C.accent} stopOpacity={0.2}/>
                      <stop offset="95%" stopColor={C.accent} stopOpacity={0}/>
                    </linearGradient></defs>
                    <XAxis dataKey="date" tick={{fontSize:9,fill:C.muted}}/>
                    <YAxis tick={{fontSize:9,fill:C.muted}}/>
                    <Tooltip formatter={v=>`¥${fmt(v)}`} contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:4,fontSize:11}}/>
                    <Area type="monotone" dataKey="value" stroke={C.accent} strokeWidth={1.5} fill="url(#ag)"/>
                  </AreaChart>
                </ResponsiveContainer>
              ) : (
                <div style={{height:160,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:11}}>累积数据后显示</div>
              )}
            </div>
          </div>

          {/* 持仓列表 */}
          <div style={{padding:"16px 24px 8px",fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase"}}>持仓列表</div>
          {stats.map((f,i)=>(
            <FundRow key={f.id} fund={f} color={COLORS[i%COLORS.length]}
              onDetail={()=>onDetail(f.id)} onEdit={()=>onEdit(f)} onDelete={()=>onDelete(f.id)}
              navUpdateId={navUpdateId} navInput={navInput}
              setNavInput={setNavInput} setNavUpdateId={setNavUpdateId}
              confirmNavUpdate={confirmNavUpdate} status={fetchStatus[f.id]}/>
          ))}
        </>
      )}
    </div>
  );
}

// ═══════════════════════════ FUND ROW ═══════════════════════════════════════
function FundRow({fund:f,color,onDetail,onEdit,onDelete,navUpdateId,navInput,setNavInput,setNavUpdateId,confirmNavUpdate,status}) {
  const isPos = f.pnl>=0;
  const st = status ? STATUS[status] : null;
  const isUpdating = navUpdateId===f.id;

  return (
    <div style={{borderTop:`1px solid ${C.border}`}}>
      <div style={{padding:"14px 24px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:4,height:36,borderRadius:2,background:color,flexShrink:0}}/>
        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={onDetail}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontSize:14,color:C.text}}>{f.name||f.code}</span>
            <span style={{fontSize:10,color:C.muted}}>{f.code}</span>
            <span style={{fontSize:9,padding:"1px 5px",borderRadius:2,background:C.accentDim,color:C.accent}}>{f.type}</span>
            {st&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:2,background:`${st.color}18`,color:st.color}}>{st.label}</span>}
          </div>
          <div style={{display:"flex",gap:14,marginTop:3}}>
            <span style={{fontSize:11,color:C.muted}}>¥{fmt(f.curValue)}</span>
            <span style={{fontSize:11,color:isPos?C.green:C.red,fontWeight:500}}>{fmtPct(f.pnlPct)} · {isPos?"+":""}¥{fmt(f.pnl)}</span>
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:15,fontWeight:400,color:C.text}}>{fmt(f.cur,4)}</div>
          <div style={{fontSize:9,color:C.muted}}>净值</div>
        </div>
        <div style={{display:"flex",gap:5,flexShrink:0}}>
          <button onClick={()=>{setNavUpdateId(f.id);setNavInput(f.currentNav);}} style={iBtn} title="手动更新">✎</button>
          <button onClick={onEdit} style={iBtn} title="编辑">⚙</button>
          <button onClick={onDelete} style={{...iBtn,color:C.red}} title="删除">×</button>
        </div>
      </div>
      {isUpdating&&(
        <div style={{padding:"0 24px 14px",display:"flex",gap:8}}>
          <input type="number" step="0.0001" placeholder="手动输入净值" value={navInput}
            onChange={e=>setNavInput(e.target.value)} style={inp}
            onKeyDown={e=>e.key==="Enter"&&confirmNavUpdate(f.id)} autoFocus/>
          <button onClick={()=>confirmNavUpdate(f.id)} style={btn(C.accent,"#fff",true)}>确认</button>
          <button onClick={()=>setNavUpdateId(null)} style={btn(C.border,C.muted,true)}>取消</button>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════ DETAIL VIEW ════════════════════════════════════
function DetailView({fund:f,onBack,onEdit,navUpdateId,navInput,setNavInput,setNavUpdateId,confirmNavUpdate,fetchStatus,onAutoFetch}) {
  const isPos = f.pnl>=0;
  const histData = (f.history||[]).filter(h=>h.nav);
  const status = fetchStatus?.[f.id];
  const st = status ? STATUS[status] : null;
  const isLoading = status==="loading";

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Mono','Courier New',monospace",paddingBottom:60}}>
      <div style={{padding:"24px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{...iBtn,fontSize:15,padding:"4px 10px"}}>←</button>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16,color:C.text}}>{f.name}</span>
            {st&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:2,background:`${st.color}18`,color:st.color}}>{st.label}</span>}
          </div>
          <div style={{fontSize:10,color:C.muted,marginTop:2}}>{f.code} · {f.type}</div>
        </div>
        <button onClick={onAutoFetch} disabled={isLoading} style={btn(C.accentDim,C.accent,true,isLoading)}>
          {isLoading?"更新中…":"⟳ 自动更新"}
        </button>
        <button onClick={onEdit} style={btn(C.border,C.text,true)}>编辑</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,background:C.border,margin:"1px 0"}}>
        {[
          {label:"买入金额",val:`¥${fmt(f.buy)}`},
          {label:"当前市值",val:`¥${fmt(f.curValue)}`},
          {label:"盈亏金额",val:`${f.pnl>=0?"+":""}¥${fmt(f.pnl)}`,color:isPos?C.green:C.red},
          {label:"收益率",val:fmtPct(f.pnlPct),color:isPos?C.green:C.red},
          {label:"成本净值",val:fmt(f.cost,4)},
          {label:"当前净值",val:fmt(f.cur,4)},
          {label:"持有份额",val:fmt(f.shares,2)},
          {label:"净值变动",val:`${f.cur>=f.cost?"+":""}${fmt(f.cur-f.cost,4)}`},
        ].map((item,i)=>(
          <div key={i} style={{background:C.card,padding:"14px 20px"}}>
            <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:4}}>{item.label}</div>
            <div style={{fontSize:15,fontWeight:500,color:item.color||C.text}}>{item.val}</div>
          </div>
        ))}
      </div>

      <div style={{padding:"20px 24px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={sLabel}>净值走势</div>
          <button onClick={()=>{setNavUpdateId(f.id);setNavInput(f.currentNav);}} style={btn(C.accentDim,C.accent,true)}>手动更新</button>
        </div>
        {navUpdateId===f.id&&(
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input type="number" step="0.0001" placeholder="输入最新净值" value={navInput}
              onChange={e=>setNavInput(e.target.value)} style={inp}
              onKeyDown={e=>e.key==="Enter"&&confirmNavUpdate(f.id)} autoFocus/>
            <button onClick={()=>confirmNavUpdate(f.id)} style={btn(C.accent,"#fff",true)}>确认</button>
            <button onClick={()=>setNavUpdateId(null)} style={btn(C.border,C.muted,true)}>取消</button>
          </div>
        )}
        {histData.length>1 ? (
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={histData} margin={{top:4,right:0,left:-20,bottom:0}}>
              <defs><linearGradient id="ng" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%" stopColor={C.gold} stopOpacity={0.25}/>
                <stop offset="95%" stopColor={C.gold} stopOpacity={0}/>
              </linearGradient></defs>
              <XAxis dataKey="date" tick={{fontSize:9,fill:C.muted}}/>
              <YAxis tick={{fontSize:9,fill:C.muted}} domain={["auto","auto"]}/>
              <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:4,fontSize:11}}/>
              <Area type="monotone" dataKey="nav" stroke={C.gold} strokeWidth={1.5} fill="url(#ng)" dot={{r:2,fill:C.gold}}/>
            </AreaChart>
          </ResponsiveContainer>
        ) : (
          <div style={{height:140,border:`1px dashed ${C.border}`,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:11}}>
            多次更新后显示走势图
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════ FORM VIEW ══════════════════════════════════════
function FormView({form,setForm,onSave,onCancel,isEdit}) {
  const set = k => e => setForm(p=>({...p,[k]:e.target.value}));
  const codeOk = /^\d{6}$/.test(form.code);

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Mono','Courier New',monospace"}}>
      <div style={{padding:"24px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onCancel} style={{...iBtn,fontSize:15,padding:"4px 10px"}}>←</button>
        <div style={{fontSize:16,color:C.text}}>{isEdit?"编辑基金":"添加基金"}</div>
      </div>
      <div style={{padding:24,display:"flex",flexDirection:"column",gap:16,maxWidth:480}}>
        <div>
          <div style={fLabel}>基金代码</div>
          <input type="text" placeholder="6位数字，如 110020" value={form.code} onChange={set("code")} style={inp} maxLength={6}/>
          {form.code&&!codeOk&&<div style={{fontSize:10,color:C.red,marginTop:4}}>请输入6位数字代码</div>}
          {codeOk&&<div style={{fontSize:10,color:C.green,marginTop:4}}>✓ 保存后将自动从天天基金拉取净值</div>}
        </div>
        {[
          {label:"基金名称",key:"name",placeholder:"如 易方达沪深300ETF"},
          {label:"买入金额 (¥)",key:"buyAmount",placeholder:"如 10000",type:"number"},
          {label:"成本净值",key:"costNav",placeholder:"如 1.2345",type:"number"},
          {label:"当前净值（选填）",key:"currentNav",placeholder:"留空则同成本净值",type:"number"},
        ].map(item=>(
          <div key={item.key}>
            <div style={fLabel}>{item.label}</div>
            <input type={item.type||"text"} placeholder={item.placeholder} value={form[item.key]} onChange={set(item.key)} style={inp}/>
          </div>
        ))}
        <div>
          <div style={fLabel}>基金类型</div>
          <select value={form.type} onChange={set("type")} style={{...inp,cursor:"pointer"}}>
            {["A股公募","ETF场内","港股基金","美股基金","债券基金","货币基金"].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        <div style={{display:"flex",gap:12,marginTop:8}}>
          <button onClick={onSave} style={{...btn(C.accent,"#fff"),flex:1,padding:"12px 0"}}>{isEdit?"保存修改":"添加持仓"}</button>
          <button onClick={onCancel} style={{...btn(C.border,C.muted),flex:1,padding:"12px 0"}}>取消</button>
        </div>
      </div>
    </div>
  );
}

// ─── 样式工具 ──────────────────────────────────────────────────────────────
const sLabel = {fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:12};
const fLabel = {fontSize:10,color:C.muted,letterSpacing:2,marginBottom:6,textTransform:"uppercase"};
const iBtn = {background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,padding:"4px 8px",cursor:"pointer",fontSize:13};
const inp = {width:"100%",background:C.card,border:`1px solid ${C.border}`,color:C.text,borderRadius:4,padding:"10px 12px",fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box"};
const btn = (bg,color,small,disabled) => ({
  background: (bg===C.border||bg===C.accentDim) ? "transparent" : bg,
  border: `1px solid ${bg==="transparent"?C.border:bg}`,
  color, borderRadius:4,
  padding: small?"6px 14px":"8px 16px",
  cursor: disabled?"not-allowed":"pointer",
  fontSize: small?11:13,
  fontFamily:"inherit", letterSpacing:1, whiteSpace:"nowrap",
  opacity: disabled?0.5:1,
});

// ─── 挂载 ──────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
