// ─── 数据迁移（旧格式 → 新格式）────────────────────────────────────────────────
function migrateFund(f) {
  // 如果已经有 purchases 数组，不需要迁移
  if (f.purchases && f.purchases.length > 0) return f;
  
  // 旧格式：holdingValue + holdingProfit → 转成单笔买入记录
  const holdingValue = parseFloat(f.holdingValue) || 0;
  const holdingProfit = parseFloat(f.holdingProfit) || 0;
  const cost = holdingValue - holdingProfit;
  const costNav = parseFloat(f.costNav) || parseFloat(f.currentNav) || 1;
  
  if (cost <= 0) return {...f, purchases: []};
  
  // 构造一笔买入记录
  const purchase = {
    id: f.id + "_migrated",
    date: f.history?.[0]?.date || new Date().toISOString().slice(0,10),
    amount: String(cost.toFixed(2)),
    nav: String(costNav),
  };
  
  return {
    ...f,
    purchases: [purchase],
    style: f.style || "成长",
    industry: f.industry || f.tags?.split(/[,，]/)[0] || "",
    isSIP: f.isSIP || false,
    sipDay: f.sipDay || "",
    peakNav: f.peakNav || "",
    alert: f.alert || {profitUp:"",profitDown:"",dayUp:"",dayDown:"",drawdown:""},
  };
}

// ─── 类型自动识别 ─────────────────────────────────────────────────────────────
function detectType(name){
  if(!name) return "A股公募";
  if((name.includes("ETF")||name.includes("etf"))&&!name.includes("联接")&&!name.includes("发起")) return "ETF场内";
  if(name.includes("QDII")||name.includes("标普")||name.includes("纳斯达克")||name.includes("美元")||name.includes("美股")) return "美股基金";
  if(name.includes("恒生")||name.includes("港股")||name.includes("香港")||name.includes("H股")) return "港股基金";
  if(name.includes("债")||name.includes("固收")) return "债券基金";
  if(name.includes("货币")||name.includes("现金")) return "货币基金";
  return "A股公募";
}

// ─── 赎回费率表 ──────────────────────────────────────────────────────────────
function getRedemptionFee(days) {
  if (days < 7)   return { rate: 1.5,  label: "惩罚期" };
  if (days < 30)  return { rate: 0.75, label: "短期持有" };
  if (days < 365) return { rate: 0.5,  label: "中期持有" };
  if (days < 730) return { rate: 0.25, label: "长期持有" };
  return { rate: 0, label: "免赎回费" };
}
function daysSince(dateStr) {
  if (!dateStr) return 0;
  return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
}
function nextFeeThreshold(days) {
  if (days < 7)   return { days: 7-days,   nextRate: 0.75, label: "7天后降至 0.75%" };
  if (days < 30)  return { days: 30-days,  nextRate: 0.5,  label: "30天后降至 0.5%" };
  if (days < 365) return { days: 365-days, nextRate: 0.25, label: "1年后降至 0.25%" };
  if (days < 730) return { days: 730-days, nextRate: 0,    label: "2年后免赎回费" };
  return null;
}

// ─── 计算函数 ──────────────────────────────────────────────────────────────────
function calcFundStats(fund) {
  const purchases = fund.purchases || [];
  const currentNav = parseFloat(fund.currentNav) || 0;

  // 从所有买入记录算总成本和总份额
  let totalCost = 0, totalShares = 0;
  for (const p of purchases) {
    const amt = parseFloat(p.amount) || 0;
    const nav = parseFloat(p.nav) || 1;
    const shares = amt / nav;
    totalCost += amt;
    totalShares += shares;
  }
  const avgCostNav = totalShares > 0 ? totalCost / totalShares : 0;
  const currentValue = totalShares * currentNav;
  const holdingProfit = currentValue - totalCost;
  const pnlPct = totalCost > 0 ? (holdingProfit / totalCost * 100) : 0;

  // 最新买入日期（最近一笔）
  const sortedPurchases = [...purchases].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const latestPurchase = sortedPurchases[0];
  const daysHeld = latestPurchase ? daysSince(latestPurchase.date) : 0;
  const feeInfo = getRedemptionFee(daysHeld);
  const nextFee = nextFeeThreshold(daysHeld);
  const redeemFeeAmt = currentValue * feeInfo.rate / 100;
  const netProfit = holdingProfit - redeemFeeAmt;

  return { totalCost, totalShares, avgCostNav, currentValue, holdingProfit, pnlPct, daysHeld, feeInfo, nextFee, redeemFeeAmt, netProfit, latestPurchase };
}

// ─── 回本计算 ──────────────────────────────────────────────────────────────────
function calcBreakEven(fund, extraAmount=0) {
  const purchases = fund.purchases || [];
  const currentNav = parseFloat(fund.currentNav) || 0;
  let totalCost=0, totalShares=0;
  for (const p of purchases) {
    const amt=parseFloat(p.amount)||0, nav=parseFloat(p.nav)||1;
    totalCost+=amt; totalShares+=amt/nav;
  }
  if (extraAmount > 0 && currentNav > 0) {
    totalCost += extraAmount;
    totalShares += extraAmount / currentNav;
  }
  const newAvgNav = totalShares > 0 ? totalCost / totalShares : 0;
  const riseNeeded = newAvgNav > 0 && currentNav > 0 ? ((newAvgNav - currentNav) / currentNav * 100) : 0;
  return { newAvgNav, riseNeeded, totalCost, totalShares };
}

// ─── 回撤检测 ─────────────────────────────────────────────────────────────────
function calcDrawdown(history) {
  if (!history||history.length<2) return {drawdownPct:0,peakNav:0,peakDate:""};
  let peakNav=0,peakDate="";
  for (const h of history) { if(h.nav>peakNav){peakNav=h.nav;peakDate=h.date;} }
  const curNav=history[history.length-1].nav;
  return {drawdownPct:peakNav>0?((curNav-peakNav)/peakNav*100):0,peakNav,peakDate};
}

// ─── 提醒检测 ─────────────────────────────────────────────────────────────────
function checkAlert(fund, stats) {
  const a=fund.alert||{};
  const triggered=[];
  if(a.profitUp&&stats.pnlPct>=parseFloat(a.profitUp)) triggered.push({type:"up",msg:`持有收益 ${fmtPct(stats.pnlPct)} 超 +${a.profitUp}%`});
  if(a.profitDown&&stats.pnlPct<=-parseFloat(a.profitDown)) triggered.push({type:"down",msg:`持有收益 ${fmtPct(stats.pnlPct)} 跌超 -${a.profitDown}%`});
  const hist=fund.history||[];
  if(hist.length>=2){
    const cur=hist[hist.length-1].nav,prev=hist[hist.length-2].nav;
    const dayPct=prev?((cur-prev)/prev*100):0;
    if(a.dayUp&&dayPct>=parseFloat(a.dayUp)) triggered.push({type:"up",msg:`今日涨 ${fmtPct(dayPct)} 超 +${a.dayUp}%`});
    if(a.dayDown&&dayPct<=-parseFloat(a.dayDown)) triggered.push({type:"down",msg:`今日跌 ${fmtPct(dayPct)} 超 -${a.dayDown}%`});
  }
  if(a.drawdown&&hist.length>=2){
    const {drawdownPct,peakNav,peakDate}=calcDrawdown(hist);
    if(drawdownPct<=-parseFloat(a.drawdown)) triggered.push({type:"drawdown",msg:`回撤 ${fmt(Math.abs(drawdownPct))}%，距高点 ${fmt(peakNav,4)}（${peakDate}）`});
  }
  return triggered;
}

function check_all_rules(funds, statsMap) {
  const triggered = []; // [{ruleKey, fundId, fundName, detail}]
  const totalValue = Object.values(statsMap).reduce((s,st)=>s+st.currentValue,0);
  if(totalValue===0) return triggered;

  // 行业汇总
  const industryMap = {};
  const styleMap = { "成长":0, "红利":0, "稳健":0, "其他":0 };
  funds.forEach(f => {
    const val = statsMap[f.id]?.currentValue || 0;
    const ind = f.industry || f.tags?.split(/[,，]/)[0] || "未分类";
    industryMap[ind] = (industryMap[ind]||0) + val;
    const s = f.style||"成长";
    styleMap[s] = (styleMap[s]||0) + val;
  });

  // A1: 单行业 > 50%
  Object.entries(industryMap).forEach(([ind,val])=>{
    if(val/totalValue>0.5) triggered.push({ruleKey:"LOGIC_CONCENTRATION_INDUSTRY",fundName:ind,detail:`${ind} 占 ${fmt(val/totalValue*100)}%`});
  });

  // A2: 单基金 > 30%
  funds.forEach(f=>{
    const val=statsMap[f.id]?.currentValue||0;
    if(val/totalValue>0.3) triggered.push({ruleKey:"LOGIC_CONCENTRATION_FUND",fundId:f.id,fundName:f.name||f.code,detail:`占比 ${fmt(val/totalValue*100)}%`});
  });

  // A3: 风格偏斜
  const growthPct = styleMap["成长"]/totalValue*100;
  const stablePct = styleMap["稳健"]/totalValue*100;
  if(growthPct>60) triggered.push({ruleKey:"LOGIC_STYLE_BIAS",fundName:"组合",detail:`成长型占 ${fmt(growthPct)}%，超过 60%`});
  else if(stablePct<10&&totalValue>0) triggered.push({ruleKey:"LOGIC_STYLE_BIAS",fundName:"组合",detail:`稳健型仅 ${fmt(stablePct)}%，低于 10%`});

  // B1: 回撤 > 15%
  funds.forEach(f=>{
    const peakNav=parseFloat(f.peakNav)||0;
    const curNav=parseFloat(f.currentNav)||0;
    if(peakNav>0&&curNav>0){
      const dd=(curNav-peakNav)/peakNav*100;
      if(dd<-15) triggered.push({ruleKey:"LOGIC_DRAWDOWN_CRITICAL",fundId:f.id,fundName:f.name||f.code,detail:`从高点 ${fmt(peakNav,4)} 回撤 ${fmt(Math.abs(dd))}%`});
    }
    // 也检测history最高
    const hist=f.history||[];
    if(hist.length>=2){
      const{drawdownPct,peakNav:hp,peakDate}=calcDrawdown(hist);
      if(drawdownPct<-15) triggered.push({ruleKey:"LOGIC_DRAWDOWN_CRITICAL",fundId:f.id,fundName:f.name||f.code,detail:`净值从 ${fmt(hp,4)}（${peakDate}）回撤 ${fmt(Math.abs(drawdownPct))}%`});
    }
  });

  // B2: 盈利回吐 < 历史最高 * 50%
  funds.forEach(f=>{
    const st=statsMap[f.id];
    if(!st||st.totalCost===0)return;
    const peakPct=parseFloat(f.peakProfitPct)||0;
    if(peakPct>10&&st.pnlPct<peakPct*0.5)
      triggered.push({ruleKey:"LOGIC_PROFIT_RETRACEMENT",fundId:f.id,fundName:f.name||f.code,detail:`当前收益 ${fmtPct(st.pnlPct)}，历史最高 ${fmtPct(peakPct)}`});
  });

  // C1: 静默期 > 90天
  funds.forEach(f=>{
    const purchases=f.purchases||[];
    if(!purchases.length)return;
    const latest=purchases.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    const days=daysSince(latest.date);
    if(days>90) triggered.push({ruleKey:"LOGIC_STAGNATION_REVIEW",fundId:f.id,fundName:f.name||f.code,detail:`最近操作在 ${latest.date}，已 ${days} 天未动`});
  });

  // C2: 7天内买入 > 3次（基于purchases）
  funds.forEach(f=>{
    const recent=(f.purchases||[]).filter(p=>daysSince(p.date)<=7);
    if(recent.length>3) triggered.push({ruleKey:"LOGIC_OVER_TRADING",fundId:f.id,fundName:f.name||f.code,detail:`7天内操作 ${recent.length} 次`});
  });

  // C3: 定投本月未执行
  const thisMonth=new Date().toISOString().slice(0,7);
  funds.filter(f=>f.isSIP).forEach(f=>{
    const hasThisMonth=(f.purchases||[]).some(p=>p.date?.startsWith(thisMonth));
    if(!hasThisMonth) triggered.push({ruleKey:"LOGIC_SIP_INTERRUPTED",fundId:f.id,fundName:f.name||f.code,detail:`${thisMonth} 未发现定投记录`});
  });

  return triggered;
}

function get_command(triggered) {
  if(triggered.length===0) return "COMMAND_HOLD";
  const priority = {high:3,medium:2,low:1};
  const sorted = [...triggered].sort((a,b)=>{
    const pa=priority[RULES[a.ruleKey]?.priority||"low"];
    const pb=priority[RULES[b.ruleKey]?.priority||"low"];
    return pb-pa;
  });
  return RULES[sorted[0].ruleKey]?.command||"COMMAND_HOLD";
}

function PieChart({data}){
  const ref=useRef(),inst=useRef();
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:"doughnut",data:{labels:data.map(d=>d.name),datasets:[{data:data.map(d=>d.value),backgroundColor:COLORS,borderWidth:0,hoverOffset:4}]},options:{cutout:"65%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`¥${fmt(c.raw)}`}}},animation:{duration:400}}});
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data)]);
  return React.createElement("canvas",{ref,height:120});
}
function LineChart({data,color}){
  const ref=useRef(),inst=useRef();
  useEffect(()=>{
    if(!ref.current||data.length<2)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:"line",data:{labels:data.map(d=>d.date),datasets:[{data:data.map(d=>d.value??d.nav),borderColor:color||C.accent,borderWidth:1.5,fill:true,backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);g.addColorStop(0,(color||C.accent)+"33");g.addColorStop(1,(color||C.accent)+"00");return g;},pointRadius:1,tension:0.3}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw,4)}`}}},scales:{x:{grid:{display:false},ticks:{font:{size:9},color:C.muted,maxTicksLimit:8}},y:{grid:{color:"#f0f0ee"},ticks:{font:{size:9},color:C.muted}}},animation:{duration:300}}});
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data),color]);
  return React.createElement("canvas",{ref,height:160});
}
function Tags({tags,size=9}){
  if(!tags)return null;
  const list=tags.split(/[,，、\s]+/).filter(Boolean);
  const tc=["#7BA7BC","#A8C5A0","#D4956A","#C5A8C5","#8FB8AD"];
  return <span style={{display:"inline-flex",flexWrap:"wrap",gap:3}}>
    {list.map((t,i)=><span key={i} style={{fontSize:size,padding:"1px 6px",borderRadius:10,background:tc[i%tc.length]+"28",color:tc[i%tc.length],fontWeight:500}}>{t}</span>)}
  </span>;
}

// ═══════════════════════════ APP ════════════════════════════════════════════
function App(){
  const [funds,setFunds]=useState([]);
  const [ph,setPh]=useState([]);
  const [view,setView]=useState("dash");
  const [activeId,setActiveId]=useState(null);
  const [form,setForm]=useState(emptyFund());
  const [loaded,setLoaded]=useState(false);
  const [fs,setFs]=useState({});

  useEffect(()=>{(async()=>{const f=await dbLoad("funds");if(f)setFunds(f.map(migrateFund));const p=await dbLoad("ph");if(p)setPh(p);setLoaded(true);})();},[]);
  useEffect(()=>{if(loaded)dbSave("funds",funds);},[funds,loaded]);
  useEffect(()=>{if(loaded)dbSave("ph",ph);},[ph,loaded]);

  const autoFetch=useCallback(async(override)=>{
    const src=override??funds;
    const targets=src.filter(f=>/^\d{6}$/.test(f.code));
    if(!targets.length)return;
    const td=todayStr();
    setFs(p=>{const n={...p};targets.forEach(f=>{n[f.id]="loading";});return n;});
    const results=await Promise.allSettled(targets.map(f=>fetchNav(f.code)));
    setFunds(prev=>prev.map(fund=>{
      const i=targets.findIndex(t=>t.id===fund.id);if(i===-1)return fund;
      const res=results[i];
      if(res.status==="fulfilled"&&res.value?.nav){
        const{nav,name:fn,isEstimate}=res.value;
        const hist=[...(fund.history||[])];
        if(hist[hist.length-1]?.date===td)hist[hist.length-1]={date:td,nav};else hist.push({date:td,nav});
        setFs(p=>({...p,[fund.id]:isEstimate?"estimate":"ok"}));
        return{...fund,currentNav:String(nav),history:hist,name:fund.name||fn||fund.name};
      }
      setFs(p=>({...p,[fund.id]:"error"}));return fund;
    }));
  },[funds]);

  useEffect(()=>{if(loaded&&funds.length>0)autoFetch(funds);},[loaded]);

  // 计算所有基金的统计数据
  const statsMap={};
  let totalCost=0,totalValue=0;
  for(const f of funds){
    const s=calcFundStats(f);
    statsMap[f.id]=s;
    totalCost+=s.totalCost;
    totalValue+=s.currentValue;
  }
  const totalPnl=totalValue-totalCost;
  const totalPnlPct=totalCost>0?(totalPnl/totalCost*100):0;

  // 板块汇总
  const tagMap={};
  funds.forEach(f=>{
    if(!f.tags)return;
    f.tags.split(/[,，、\s]+/).filter(Boolean).forEach(t=>{tagMap[t]=(tagMap[t]||0)+(statsMap[f.id]?.currentValue||0);});
  });

  useEffect(()=>{
    if(!loaded||totalValue===0)return;
    const td=todayStr();
    setPh(prev=>{const arr=[...prev],snap={date:td,value:totalValue};if(arr[arr.length-1]?.date===td)arr[arr.length-1]=snap;else arr.push(snap);return arr.slice(-90);});
  },[totalValue,loaded]);

  const openAdd=()=>{setForm({...emptyFund(),purchases:[emptyPurchase()]});setView("add");};
  const openEdit=f=>{setForm({...f,purchases:f.purchases?.length?f.purchases:[emptyPurchase()]});setView("edit");};
  const saveFund=()=>{
    if(!form.name||!form.purchases?.length)return;
    const entry={...form,history:form.history||[]};
    if(view==="add"){setFunds(p=>[...p,entry]);setTimeout(()=>autoFetch([entry]),200);}
    else setFunds(p=>p.map(f=>f.id===entry.id?entry:f));
    setView("dash");
  };
  const delFund=id=>{if(window.confirm("确认删除？"))setFunds(p=>p.filter(f=>f.id!==id));};

  // 运行风险规则引擎
  const triggeredRules = check_all_rules(funds, statsMap);
  const topCommand = get_command(triggeredRules);

  if(!loaded)return<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.muted}}>加载中…</div>;
  const activeF=funds.find(f=>f.id===activeId);
  const activeStats=activeF?statsMap[activeId]:null;

  if(view==="risk")return<RiskPanel funds={funds} statsMap={statsMap} triggered={triggeredRules} command={topCommand} onBack={()=>setView("dash")}/>;
  if(view==="detail"&&activeF)return<Detail fund={activeF} stats={activeStats} onBack={()=>setView("dash")} onEdit={()=>openEdit(activeF)} fs={fs} onFetch={()=>autoFetch([activeF])}/>;
  if(view==="add"||view==="edit")return<Form form={form} setForm={setForm} onSave={saveFund} onCancel={()=>setView("dash")} isEdit={view==="edit"}/>;
  return<Dash funds={funds} statsMap={statsMap} totalCost={totalCost} totalValue={totalValue} totalPnl={totalPnl} totalPnlPct={totalPnlPct} ph={ph} tagMap={tagMap} onAdd={openAdd} onEdit={openEdit} onDel={delFund} onDetail={id=>{setActiveId(id);setView("detail");}} fs={fs} onFetch={()=>autoFetch()} triggered={triggeredRules} command={topCommand} onRisk={()=>setView("risk")}/>;
}

// ═══════════════════════════ DASHBOARD ══════════════════════════════════════
function Dash({funds,statsMap,totalCost,totalValue,totalPnl,totalPnlPct,ph,tagMap,onAdd,onEdit,onDel,onDetail,fs,onFetch,triggered,command,onRisk}){

  const anyLoading=Object.values(fs).some(v=>v==="loading");

  const topTags=Object.entries(tagMap).sort((a,b)=>b[1]-a[1]).slice(0,6);

  return(
    <div style={{minHeight:"100vh",background:C.bg,paddingBottom:80}}>
      <div style={{padding:"28px 24px 0",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>

            <button onClick={onAdd} style={btn(C.accent,"#fff")}>+ 添加</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",marginTop:24}}>
          {[{label:"总成本",val:`¥${fmt(totalCost)}`},{label:"当前市值",val:`¥${fmt(totalValue)}`,hi:true},{label:"总盈亏",val:fmtPct(totalPnlPct),sub:`${totalPnl>=0?"+":""}¥${fmt(totalPnl)}`,color:isPos?C.green:C.red}].map((item,i)=>(
            <div key={i} style={{padding:"18px 0",borderLeft:i>0?`1px solid ${C.border}`:"none",paddingLeft:i>0?20:0}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:5}}>{item.label}</div>
              <div style={{fontSize:item.hi?20:15,color:item.color||C.text,fontWeight:item.hi?600:300}}>{item.val}</div>
              {item.sub&&<div style={{fontSize:11,color:item.color,marginTop:2}}>{item.sub}</div>}
            </div>
          ))}
        </div>
      </div>

      {/* 风险诊断横幅 */}
      {funds.length>0&&(()=>{
        const cmd=COMMAND_LABELS[command]||COMMAND_LABELS["COMMAND_HOLD"];
        const isOk=command==="COMMAND_HOLD";
        return(
          <div onClick={onRisk} style={{margin:"12px 24px 0",padding:"12px 16px",background:cmd.bg,border:`1px solid ${cmd.color}33`,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:16}}>{isOk?"✓":"⚠"}</span>
              <div>
                <div style={{fontSize:12,color:cmd.color,fontWeight:600}}>{cmd.text}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:2}}>
                  {isOk?"当前无明显风险信号":`${triggered.length} 条规则触发 · 点击查看详情`}
                </div>
              </div>
            </div>
            <span style={{fontSize:12,color:cmd.color}}>风险诊断 →</span>
          </div>
        );
      })()}

      {funds.length===0?(
        <div style={{textAlign:"center",padding:"80px 24px",color:C.muted}}>
          <div style={{fontSize:40,marginBottom:16}}>◎</div>
          <div>还没有持仓</div>
          <div style={{fontSize:12,marginTop:8}}>点击添加，录入基金代码和买入记录</div>
        </div>
      ):(
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,margin:"1px 0",background:C.border}}>
            <div style={{background:C.card,padding:"16px 20px"}}>
              <div style={sLabel}>仓位占比</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:120,flexShrink:0}}><PieChart data={pieData}/></div>
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:5,minWidth:0}}>
                  {pieData.map((d,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:5,minWidth:0}}>
                        <span style={{width:6,height:6,borderRadius:1,background:COLORS[i%COLORS.length],flexShrink:0}}/>
                        <span style={{fontSize:10,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</span>
                      </div>
                      <span style={{fontSize:10,color:C.muted,flexShrink:0}}>{totalValue>0?((d.value/totalValue)*100).toFixed(0)+"%":"--"}</span>

                  ))}
                </div>
              </div>
            </div>
            <div style={{background:C.card,padding:"16px 20px"}}>
              <div style={sLabel}>总资产走势</div>
              {ph.length>1?<LineChart data={ph} color={C.accent}/>:<div style={{height:160,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:11}}>累积数据后显示</div>}

          {topTags.length>0&&(
            <div style={{padding:"16px 24px",borderBottom:`1px solid ${C.border}`}}>

              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>

                  <div key={tag} style={{display:"flex",alignItems:"center",gap:6,background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:"5px 12px"}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:COLORS[i%COLORS.length],flexShrink:0}}/>
                    <span style={{fontSize:11}}>{tag}</span>
                    <span style={{fontSize:10,color:C.muted}}>¥{fmt(val,0)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{padding:"16px 24px 8px",fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase"}}>持仓列表</div>
          {funds.map((f,i)=><Row key={f.id} fund={f} stats={statsMap[f.id]} color={COLORS[i%COLORS.length]} onDetail={()=>onDetail(f.id)} onEdit={()=>onEdit(f)} onDel={()=>onDel(f.id)} status={fs[f.id]}/>)}
        </>
      )}
    </div>
  );
}

// ═══════════════════════════ ROW ════════════════════════════════════════════

          <div style={sLabel}>回本计算器</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:12}}>
            当前亏损 {fmtPct(s.pnlPct)}，需涨 <strong style={{color:C.red}}>{fmt(Math.abs(s.avgCostNav/parseFloat(f.currentNav)-1)*100)}%</strong> 才能回本
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
            <input type="number" placeholder="模拟补仓金额 (¥)" value={extraAmt} onChange={e=>setExtraAmt(e.target.value)} style={{...inp,flex:1}}/>
          </div>
          {extraAmt&&parseFloat(extraAmt)>0&&(
            <div style={{background:C.accentDim,borderRadius:6,padding:12}}>
              <div style={{fontSize:11,color:C.accent,marginBottom:6}}>补仓 ¥{fmt(parseFloat(extraAmt))} 后：</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div>
                  <div style={{fontSize:10,color:C.muted,marginBottom:2}}>新平均成本</div>
                  <div style={{fontSize:14,fontWeight:600,color:C.text}}>{fmt(be.newAvgNav,4)}</div>
                </div>
                <div>
                  <div style={{fontSize:10,color:C.muted,marginBottom:2}}>回本还需涨</div>
                  <div style={{fontSize:14,fontWeight:600,color:be.riseNeeded<=0?C.green:C.red}}>{be.riseNeeded<=0?"已回本":fmt(be.riseNeeded)+"%"}</div>
                </div>
                <div>
                  <div style={{fontSize:10,color:C.muted,marginBottom:2}}>总成本</div>
                  <div style={{fontSize:13,color:C.text}}>¥{fmt(be.totalCost)}</div>
                </div>
                <div>
                  <div style={{fontSize:10,color:C.muted,marginBottom:2}}>总份额</div>
                  <div style={{fontSize:13,color:C.text}}>{fmt(be.totalShares,2)}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* 净值走势 */}
      {histData.length>1&&(
        <div style={{padding:"16px 24px 0"}}>
          <div style={sLabel}>净值走势（近期记录）</div>
          <LineChart data={histData.slice(-60).map(h=>({date:h.date,value:h.nav}))} color={C.gold}/>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════ RISK PANEL ════════════════════════════════════
function RiskPanel({funds,statsMap,triggered,command,onBack}){
  const cmd=COMMAND_LABELS[command]||COMMAND_LABELS["COMMAND_HOLD"];
  const isOk=command==="COMMAND_HOLD";
  const totalValue=Object.values(statsMap).reduce((s,st)=>s+st.currentValue,0);

  // 行业分布
  const industryMap={};
  const styleMap={"成长":0,"红利":0,"稳健":0,"其他":0};
  funds.forEach(f=>{
    const val=statsMap[f.id]?.currentValue||0;
    const ind=f.industry||f.tags?.split(/[,，]/)[0]||"未分类";
    industryMap[ind]=(industryMap[ind]||0)+val;
    const s=f.style||"成长";
    styleMap[s]=(styleMap[s]||0)+val;
  });

  const priorityOrder={high:0,medium:1,low:2};
  const sortedTriggered=[...triggered].sort((a,b)=>priorityOrder[RULES[a.ruleKey]?.priority||"low"]-priorityOrder[RULES[b.ruleKey]?.priority||"low"]);
  const priorityColor={high:C.red,medium:C.gold,low:C.muted};
  const priorityLabel={high:"高风险",medium:"中",low:"低"};

  return(
    <div style={{minHeight:"100vh",background:C.bg,paddingBottom:60}}>
      {/* 顶栏 */}
      <div style={{padding:"20px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{...iBtn,fontSize:15,padding:"4px 10px"}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontSize:16}}>风险诊断</div>
          <div style={{fontSize:10,color:C.muted,marginTop:2}}>基于 {funds.length} 只基金的持仓分析</div>
        </div>
      </div>

      {/* 总指令 */}
      <div style={{margin:"20px 24px 0",padding:20,background:cmd.bg,border:`1px solid ${cmd.color}44`,borderRadius:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:isOk?0:12}}>
          <span style={{fontSize:24}}>{isOk?"✓":"⚠"}</span>
          <div>
            <div style={{fontSize:16,color:cmd.color,fontWeight:600}}>{cmd.text}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{triggered.length===0?"当前无明显风险，建议继续持有。":`共触发 ${triggered.length} 条风险规则`}</div>
          </div>
        </div>
        {!isOk&&triggered.length>0&&(
          <div style={{fontSize:12,color:C.text,lineHeight:1.7,paddingTop:12,borderTop:`1px solid ${cmd.color}22`}}>
            {RULES[sortedTriggered[0]?.ruleKey]?.action}
          </div>
        )}
      </div>

      {/* 触发规则列表 */}
      {triggered.length>0&&(
        <div style={{margin:"16px 24px 0"}}>
          <div style={sLabel}>触发规则（{triggered.length}条）</div>
          {sortedTriggered.map((t,i)=>{
            const rule=RULES[t.ruleKey]||{};
            const pri=rule.priority||"low";
            const rulCmd=COMMAND_LABELS[rule.command]||COMMAND_LABELS["COMMAND_HOLD"];
            return(
              <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${priorityColor[pri]}`,borderRadius:6,padding:"12px 16px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div style={{fontSize:13,color:C.text,fontWeight:500}}>{rule.label||t.ruleKey}</div>
                  <span style={{fontSize:9,padding:"2px 6px",borderRadius:10,background:`${priorityColor[pri]}18`,color:priorityColor[pri]}}>{priorityLabel[pri]}</span>
                </div>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>{t.fundName} · {t.detail}</div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:rulCmd.bg,color:rulCmd.color,fontWeight:500}}>{rulCmd.text}</span>
                  <span style={{fontSize:10,color:C.muted}}>{rule.action}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 组合健康度概览 */}
      <div style={{margin:"16px 24px 0"}}>
        <div style={sLabel}>组合结构</div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
          {/* 行业分布 */}
          <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:8}}>行业分布</div>
            {Object.entries(industryMap).sort((a,b)=>b[1]-a[1]).map(([ind,val],i)=>{
              const pct=totalValue>0?val/totalValue*100:0;
              const over=pct>50;
              return(
                <div key={ind} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <div style={{fontSize:11,color:over?C.red:C.text,width:80,flexShrink:0}}>{ind}</div>
                  <div style={{flex:1,height:6,background:C.border,borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:over?C.red:COLORS[i%COLORS.length],borderRadius:3}}/>
                  </div>
                  <div style={{fontSize:11,color:over?C.red:C.muted,width:36,textAlign:"right"}}>{fmt(pct,0)}%</div>
                  {over&&<span style={{fontSize:9,color:C.red}}>⚠</span>}
                </div>
              );
            })}
          </div>
          {/* 风格分布 */}
          <div style={{padding:"14px 16px"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:8}}>风险风格</div>
            {Object.entries(styleMap).filter(([,v])=>v>0).map(([style,val],i)=>{
              const pct=totalValue>0?val/totalValue*100:0;
              const styleColor={"成长":C.blue,"红利":C.green,"稳健":C.accent,"其他":C.muted}[style]||C.muted;
              return(
                <div key={style} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <div style={{fontSize:11,color:C.text,width:40,flexShrink:0}}>{style}</div>
                  <div style={{flex:1,height:6,background:C.border,borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:styleColor,borderRadius:3}}/>
                  </div>
                  <div style={{fontSize:11,color:C.muted,width:36,textAlign:"right"}}>{fmt(pct,0)}%</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* 各基金单项风险 */}
      <div style={{margin:"16px 24px 0",paddingBottom:40}}>
        <div style={sLabel}>各基金持仓健康度</div>
        {funds.map(f=>{
          const st=statsMap[f.id];if(!st)return null;
          const myRules=triggered.filter(t=>t.fundId===f.id);
          const isOkF=myRules.length===0;
          return(
            <div key={f.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"12px 16px",marginBottom:8,borderLeft:`3px solid ${isOkF?C.accent:C.red}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:13}}>{f.name||f.code}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>{fmtPct(st.pnlPct)} · ¥{fmt(st.currentValue)}</div>
                </div>
                <span style={{fontSize:11,color:isOkF?C.green:C.red}}>{isOkF?"✓ 正常":myRules.length+"项提醒"}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════ FORM ════════════════════════════════════════
function Form({form,setForm,onSave,onCancel,isEdit}){
  const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const codeOk=/^\d{6}$/.test(form.code);
  const [fetching,setFetching]=useState(false);

  const handleCodeBlur=async()=>{
    if(!codeOk||form.name)return;
    setFetching(true);
    try{const res=await fetchNav(form.code);if(res.name){setForm(p=>({...p,name:res.name,type:detectType(res.name),currentNav:String(res.nav||"")}));}}catch{}
    setFetching(false);
  };

  const addPurchase=()=>setForm(p=>({...p,purchases:[...(p.purchases||[]),emptyPurchase()]}));
  const delPurchase=id=>setForm(p=>({...p,purchases:p.purchases.filter(x=>x.id!==id)}));
  const setPurchase=(id,k,v)=>setForm(p=>({...p,purchases:p.purchases.map(x=>x.id===id?{...x,[k]:v}:x)}));

  const totalCost=(form.purchases||[]).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{padding:"24px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onCancel} style={{...iBtn,fontSize:15,padding:"4px 10px"}}>←</button>
        <div style={{fontSize:16}}>{isEdit?"编辑基金":"添加基金"}</div>
      </div>
      <div style={{padding:24,display:"flex",flexDirection:"column",gap:16,maxWidth:520}}>

        {/* 代码 */}
        <div>
          <div style={fLabel}>基金代码</div>
          <input type="text" placeholder="6位数字，如 022365" value={form.code} onChange={set("code")} onBlur={handleCodeBlur} style={inp} maxLength={6}/>
          {form.code&&!codeOk&&<div style={{fontSize:10,color:C.red,marginTop:4}}>请输入6位数字</div>}
          {fetching&&<div style={{fontSize:10,color:C.blue,marginTop:4}}>获取基金信息中…</div>}
          {codeOk&&form.name&&!fetching&&<div style={{fontSize:10,color:C.green,marginTop:4}}>✓ 已识别：{form.name}</div>}
        </div>

        {/* 名称 */}
        <div>
          <div style={fLabel}>基金名称</div>
          <input type="text" placeholder="输入代码后自动填入" value={form.name} onChange={set("name")} style={inp}/>
        </div>

        {/* 买入记录 */}
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={fLabel}>买入记录</div>
            <button onClick={addPurchase} style={{...iBtn,fontSize:11,color:C.accent,borderColor:C.accent}}>+ 添加一笔</button>
          </div>
          {(form.purchases||[]).map((p,i)=>(
            <div key={p.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:14,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:11,color:C.muted}}>第 {i+1} 笔</div>
                {(form.purchases||[]).length>1&&<button onClick={()=>delPurchase(p.id)} style={{...iBtn,fontSize:11,color:C.red,borderColor:C.red}}>删除</button>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div>
                  <div style={fLabel}>买入日期</div>
                  <input type="date" value={p.date} onChange={e=>setPurchase(p.id,"date",e.target.value)} style={inp}/>
                </div>
                <div>
                  <div style={fLabel}>买入金额 (¥)</div>
                  <input type="number" placeholder="如 5000" value={p.amount} onChange={e=>setPurchase(p.id,"amount",e.target.value)} style={inp}/>
                </div>
                <div style={{gridColumn:"1/-1"}}>
                  <div style={fLabel}>买入净值（选填，用于算份额）</div>
                  <input type="number" step="0.0001" placeholder="如 3.5021，留空则用当前净值" value={p.nav} onChange={e=>setPurchase(p.id,"nav",e.target.value)} style={inp}/>
                </div>
              </div>
              {p.amount&&(p.nav||form.currentNav)&&(
                <div style={{fontSize:10,color:C.muted,marginTop:8}}>
                  份额：{fmt((parseFloat(p.amount)||0)/(parseFloat(p.nav)||parseFloat(form.currentNav)||1),2)} 份
                </div>
              )}
            </div>
          ))}
          {totalCost>0&&<div style={{fontSize:11,color:C.accent,padding:"6px 0"}}>合计买入：¥{fmt(totalCost)}</div>}
        </div>

        {/* 板块标签 + 行业 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <div style={fLabel}>所属行业</div>
            <input type="text" placeholder="如：半导体, 消费" value={form.industry||""} onChange={set("industry")} style={inp}/>
          </div>
          <div>
            <div style={fLabel}>板块/主题标签</div>
            <input type="text" placeholder="如：人工智能, CPO" value={form.tags} onChange={set("tags")} style={inp}/>
          </div>
        </div>

        {/* 风险风格 */}
        <div>
          <div style={fLabel}>风险风格（用于风险诊断）</div>
          <select value={form.style||"成长"} onChange={set("style")} style={{...inp,cursor:"pointer"}}>
            {["成长","红利","稳健","其他"].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>

        {/* 定投设置 */}
        <div style={{background:C.accentDim,borderRadius:8,padding:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:form.isSIP?10:0}}>
            <input type="checkbox" id="sipCheck" checked={!!form.isSIP} onChange={e=>setForm(p=>({...p,isSIP:e.target.checked}))} style={{width:16,height:16,cursor:"pointer"}}/>
            <label htmlFor="sipCheck" style={{fontSize:12,color:C.accent,cursor:"pointer"}}>这是定投基金</label>
          </div>
          {form.isSIP&&(
            <div>
              <div style={fLabel}>每月扣款日（如：5）</div>
              <input type="number" placeholder="如 5（每月5号）" value={form.sipDay||""} onChange={set("sipDay")} style={{...inp,background:"#fff"}} min={1} max={28}/>
            </div>
          )}
        </div>

        {/* 历史最高净值（手动录入） */}
        <div>
          <div style={fLabel}>历史最高净值（选填，用于回撤检测）</div>
          <input type="number" step="0.0001" placeholder="如 4.2300，可从天天基金查询" value={form.peakNav||""} onChange={set("peakNav")} style={inp}/>
        </div>

        {/* 类型 */}
        <div>
          <div style={fLabel}>基金类型</div>
          <select value={form.type} onChange={set("type")} style={{...inp,cursor:"pointer"}}>
            {["A股公募","ETF场内","港股基金","美股基金","债券基金","货币基金"].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>

        {/* 提醒阈值 */}
        <div style={{background:C.accentDim,borderRadius:8,padding:16}}>
          <div style={{fontSize:11,color:C.accent,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>提醒阈值（选填）</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[{label:"持有收益涨超 (%)",key:"profitUp",placeholder:"如 20"},{label:"持有收益跌超 (%)",key:"profitDown",placeholder:"如 15"},{label:"日涨超 (%)",key:"dayUp",placeholder:"如 5"},{label:"日跌超 (%)",key:"dayDown",placeholder:"如 3"}]
            .map(item=>(
              <div key={item.key}>
                <div style={{fontSize:9,color:C.accent,marginBottom:4}}>{item.label}</div>
                <input type="number" placeholder={item.placeholder} value={(form.alert||{})[item.key]||""} onChange={e=>setForm(p=>({...p,alert:{...(p.alert||{}),[item.key]:e.target.value}}))} style={{...inp,fontSize:12,padding:"7px 10px",background:"#fff"}}/>
              </div>
            ))}
          </div>
          <div style={{marginTop:10}}>
            <div style={{fontSize:9,color:C.accent,marginBottom:4}}>⚠ 净值回撤超 (%)（距历史高点）</div>
            <input type="number" placeholder="如 10" value={(form.alert||{}).drawdown||""} onChange={e=>setForm(p=>({...p,alert:{...(p.alert||{}),drawdown:e.target.value}}))} style={{...inp,fontSize:12,padding:"7px 10px",background:"#fff"}}/>
          </div>
        </div>

        <div style={{display:"flex",gap:12,marginTop:8}}>
          <button onClick={onSave} style={{...btn(C.accent,"#fff"),flex:1,padding:"12px 0"}}>{isEdit?"保存修改":"添加持仓"}</button>
          <button onClick={onCancel} style={{...btn(C.border,C.muted),flex:1,padding:"12px 0"}}>取消</button>
        </div>
      </div>
    </div>
  );
}

// ─── 样式 ──────────────────────────────────────────────────────────────────
const sLabel={fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:12};
const fLabel={fontSize:10,color:C.muted,letterSpacing:2,marginBottom:6,textTransform:"uppercase"};
const iBtn={background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,padding:"4px 8px",cursor:"pointer",fontSize:13};
const inp={width:"100%",background:"#fff",border:`1px solid ${C.border}`,color:C.text,borderRadius:4,padding:"10px 12px",fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box"};
const btn=(bg,color,small,disabled)=>({background:(bg===C.border||bg===C.accentDim)?"transparent":bg,border:`1px solid ${bg===C.accentDim?C.accent:bg}`,color,borderRadius:4,padding:small?"6px 14px":"8px 16px",cursor:disabled?"not-allowed":"pointer",fontSize:small?11:13,fontFamily:"inherit",letterSpacing:1,whiteSpace:"nowrap",opacity:disabled?0.5:1});

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
