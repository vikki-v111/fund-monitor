function fetchNav(code) {
  return new Promise((resolve,reject)=>{
    const cb=`_fcb_${code}_${Date.now()}`;
    const t=setTimeout(()=>{delete window[cb];reject(new Error("timeout"));},8000);
    window[cb]=(d)=>{
      clearTimeout(t);delete window[cb];
      if(d?.fundcode){
        const nav=parseFloat(d.gsz)||parseFloat(d.dwjz)||null;
        const name=d.name||"";
        resolve({nav,name,isEstimate:!!(parseFloat(d.gsz)&&d.gszzl)});
      }else reject(new Error("no data"));
    };
    const s=document.createElement("script");
    s.src=`https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}&callback=${cb}`;
    s.onerror=()=>{clearTimeout(t);delete window[cb];reject(new Error("err"));};
    document.head.appendChild(s);
  });
}

// ─── 历史净值（CORS 代理）────────────────────────────────────────────────────
async function fetchHistoricalNav(code,pageSize=1500){
  const url=`https://api.fund.eastmoney.com/f10/lsjz?fundCode=${code}&pageIndex=1&pageSize=${pageSize}&startDate=&endDate=`;
  // 依次尝试多个代理
  const proxies=[
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://thingproxy.freeboard.io/fetch/${url}`,
  ];
  let lastErr;
  for(const proxy of proxies){
    try{
      const r=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const data=await r.json();
      const list=data?.Data?.LSJZList||[];
      if(list.length>0) return list.map(d=>({date:d.FSRQ,nav:parseFloat(d.DWJZ)})).reverse();
    }catch(e){lastErr=e;continue;}
  }
  throw lastErr||new Error("all proxies failed");
}

// ─── 时段收益率 ────────────────────────────────────────────────────────────────
function calcPeriodReturns(navList){
  if(!navList.length) return {};
  const cur=navList[navList.length-1].nav;
  const todayDate=new Date(navList[navList.length-1].date);
  const findNav=days=>{const t=new Date(todayDate);t.setDate(t.getDate()-days);let c=navList[0];for(const n of navList){if(new Date(n.date)<=t)c=n;else break;}return c.nav;};
  const yr=todayDate.getFullYear();
  const ytdNav=(()=>{const jan1=new Date(yr,0,1);let c=navList[0];for(const n of navList){if(new Date(n.date)<jan1)c=n;else break;}return c.nav;})();
  const pct=base=>base?((cur-base)/base*100):null;
  return {"今年以来":pct(ytdNav),"近1月":pct(findNav(30)),"近3月":pct(findNav(90)),"近6月":pct(findNav(180)),"近1年":pct(findNav(365)),"近3年":pct(findNav(365*3)),"近5年":pct(findNav(365*5)),"建仓以来":pct(navList[0]?.nav)};
}

// ─── 基金类型自动识别 ─────────────────────────────────────────────────────────
function detectType(name){
  if(!name) return "A股公募";
  if((name.includes("ETF")||name.includes("etf"))&&!name.includes("联接")&&!name.includes("发起")) return "ETF场内";
  if(name.includes("QDII")||name.includes("标普")||name.includes("纳斯达克")||name.includes("美元")||name.includes("美股")) return "美股基金";
  if(name.includes("恒生")||name.includes("港股")||name.includes("香港")||name.includes("H股")) return "港股基金";
  if(name.includes("债")||name.includes("债券")||name.includes("固收")) return "债券基金";
  if(name.includes("货币")||name.includes("现金")) return "货币基金";
  return "A股公募";
}

// ─── Claude AI 分析 ────────────────────────────────────────────────────────────
async function callClaudeAnalysis(fund,returns,navList){
  const recent90=navList.slice(-90);
  const navStr=recent90.map(n=>`${n.date}:${n.nav}`).join(",");
  const returnsStr=Object.entries(returns).map(([k,v])=>`${k}: ${v!=null?v.toFixed(2)+"%":"N/A"}`).join("，");
  const prompt=`你是一位专业的基金分析师。请分析以下基金数据并给出投资建议。

基金名称：${fund.name}
基金代码：${fund.code}
基金类型：${fund.type}
板块/主题：${fund.tags||"未标注"}
用户持仓成本：¥${fmt(fund.cost)}
当前市值：¥${fmt(fund.holdingValue)}
持有收益：¥${fmt(fund.holdingProfit)} (${fmtPct(fund.pnlPct)})

各时段收益率：${returnsStr}

近90日净值（日期:净值）：${navStr}

请从以下维度分析（每点80-100字）：
1. 【走势判断】当前处于什么阶段，近期趋势如何
2. 【买卖建议】当前适合买入/持有/减仓？给出明确结论
3. 【定投适合度】适不适合定投，建议频率
4. 【做T可行性】适不适合高抛低吸，波动率如何

综合评分（⭐1-5星）和一句话总结。

结尾注明：投资有风险，以上为AI辅助分析，不构成投资建议。`;
  const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  const data=await resp.json();
  return data.content?.[0]?.text||"分析失败，请重试";
}

// ─── Chart helpers ─────────────────────────────────────────────────────────────
function PieChart({data}){
  const ref=useRef(),inst=useRef();
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:"doughnut",data:{labels:data.map(d=>d.name),datasets:[{data:data.map(d=>d.value),backgroundColor:COLORS,borderWidth:0,hoverOffset:4}]},options:{cutout:"65%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`¥${fmt(c.raw)}`}}},animation:{duration:400}}});
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data)]);
  return React.createElement("canvas",{ref,height:120});
}
function LineChart({data,color}){
  const ref=useRef(),inst=useRef();
  useEffect(()=>{
    if(!ref.current||data.length<2)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:"line",data:{labels:data.map(d=>d.date),datasets:[{data:data.map(d=>d.value??d.nav),borderColor:color||C.accent,borderWidth:1.5,fill:true,backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);g.addColorStop(0,(color||C.accent)+"33");g.addColorStop(1,(color||C.accent)+"00");return g;},pointRadius:1,tension:0.3}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw,4)}`}}},scales:{x:{grid:{display:false},ticks:{font:{size:9},color:C.muted,maxTicksLimit:8}},y:{grid:{color:"#f0f0ee"},ticks:{font:{size:9},color:C.muted}}},animation:{duration:300}}});
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data),color]);
  return React.createElement("canvas",{ref,height:180});
}

  const list=tags.split(/[,，、\s]+/).filter(Boolean);
  const tagColors=["#7BA7BC","#A8C5A0","#D4956A","#C5A8C5","#8FB8AD"];

}

// ═══════════════════════════ APP ════════════════════════════════════════════
function App(){
  const [funds,setFunds]=useState([]);
  const [ph,setPh]=useState([]);
  const [view,setView]=useState("dash");
  const [activeId,setActiveId]=useState(null);
  const [form,setForm]=useState(emptyFund());
  const [loaded,setLoaded]=useState(false);
  const [fs,setFs]=useState({});

  useEffect(()=>{(async()=>{const f=await dbLoad("funds");if(f)setFunds(f);const p=await dbLoad("ph");if(p)setPh(p);setLoaded(true);})();},[]);
  useEffect(()=>{if(loaded)dbSave("funds",funds);},[funds,loaded]);
  useEffect(()=>{if(loaded)dbSave("ph",ph);},[ph,loaded]);

  // 自动拉净值，更新 currentNav + history
  const autoFetch=useCallback(async(override)=>{
    const src=override??funds;
    const targets=src.filter(f=>/^\d{6}$/.test(f.code));
    if(!targets.length)return;
    const td=todayStr();
    setFs(p=>{const n={...p};targets.forEach(f=>{n[f.id]="loading";});return n;});
    const results=await Promise.allSettled(targets.map(f=>fetchNav(f.code)));
    setFunds(prev=>prev.map(fund=>{
      const i=targets.findIndex(t=>t.id===fund.id);if(i===-1)return fund;
      const res=results[i];
      if(res.status==="fulfilled"&&res.value?.nav){
        const{nav,name:fn,isEstimate}=res.value;
        const hist=[...(fund.history||[])];
        if(hist[hist.length-1]?.date===td)hist[hist.length-1]={date:td,nav};else hist.push({date:td,nav});
        setFs(p=>({...p,[fund.id]:isEstimate?"estimate":"ok"}));
        // 用新净值更新持有金额估算
        const cost=parseFloat(fund.holdingValue)-parseFloat(fund.holdingProfit||0);
        const shares=cost/(parseFloat(fund.currentNav)||nav);
        const newHoldingValue=shares*nav;
        return{...fund,currentNav:String(nav),history:hist,name:fund.name||fn,holdingValue:String(newHoldingValue.toFixed(2))};
      }
      setFs(p=>({...p,[fund.id]:"error"}));return fund;
    }));
  },[funds]);

  useEffect(()=>{if(loaded&&funds.length>0)autoFetch(funds);},[loaded]);

  // 计算各项指标
  const stats=funds.map(f=>{
    const holdingValue=parseFloat(f.holdingValue)||0;
    const holdingProfit=parseFloat(f.holdingProfit)||0;
    const cost=holdingValue-holdingProfit;
    const pnlPct=cost>0?(holdingProfit/cost)*100:0;
    const currentNav=parseFloat(f.currentNav)||0;
    return{...f,holdingValue,holdingProfit,cost,pnlPct,currentNav};
  });
  const totalCost=stats.reduce((s,f)=>s+f.cost,0);
  const totalValue=stats.reduce((s,f)=>s+f.holdingValue,0);
  const totalPnl=totalValue-totalCost;
  const totalPnlPct=totalCost>0?(totalPnl/totalCost)*100:0;

  // 板块汇总
  const tagMap={};
  stats.forEach(f=>{
    if(!f.tags)return;
    f.tags.split(/[,，、\s]+/).filter(Boolean).forEach(t=>{
      tagMap[t]=(tagMap[t]||0)+f.holdingValue;
    });
  });

  useEffect(()=>{
    if(!loaded||totalValue===0)return;
    const td=todayStr();
    setPh(prev=>{const arr=[...prev],snap={date:td,value:totalValue};if(arr[arr.length-1]?.date===td)arr[arr.length-1]=snap;else arr.push(snap);return arr.slice(-90);});
  },[totalValue,loaded]);

  const openAdd=()=>{setForm(emptyFund());setView("add");};
  const openEdit=f=>{setForm({...f});setView("edit");};
  const saveFund=()=>{
    if(!form.name||!form.holdingValue)return;
    const entry={...form,holdingProfit:form.holdingProfit||"0",currentNav:form.currentNav||"1",history:form.history?.length?form.history:[]};
    if(view==="add"){setFunds(p=>[...p,entry]);setTimeout(()=>autoFetch([entry]),200);}
    else setFunds(p=>p.map(f=>f.id===entry.id?entry:f));
    setView("dash");
  };
  const delFund=id=>{if(window.confirm("确认删除？"))setFunds(p=>p.filter(f=>f.id!==id));};

  if(!loaded)return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.muted}}>加载中…</div>;
  const activeF=stats.find(s=>s.id===activeId);
  if(view==="analysis"&&activeF)return <Analysis fund={activeF} onBack={()=>setView("detail")}/>;
  if(view==="detail"&&activeF)return <Detail fund={activeF} onBack={()=>setView("dash")} onEdit={()=>openEdit(activeF)} fs={fs} onFetch={()=>autoFetch([activeF])} onAnalysis={()=>setView("analysis")}/>;
  if(view==="add"||view==="edit")return <Form form={form} setForm={setForm} onSave={saveFund} onCancel={()=>setView("dash")} isEdit={view==="edit"}/>;
  return <Dash stats={stats} totalCost={totalCost} totalValue={totalValue} totalPnl={totalPnl} totalPnlPct={totalPnlPct} ph={ph} tagMap={tagMap} onAdd={openAdd} onEdit={openEdit} onDel={delFund} onDetail={id=>{setActiveId(id);setView("detail");}} fs={fs} onFetch={()=>autoFetch()}/>;
}

          </div>

          </div>
        </div>

          {[{label:"总成本",val:`¥${fmt(totalCost)}`},{label:"当前市值",val:`¥${fmt(totalValue)}`,hi:true},{label:"总盈亏",val:fmtPct(totalPnlPct),sub:`${totalPnl>=0?"+":""}¥${fmt(totalPnl)}`,color:isPos?C.green:C.red}].map((item,i)=>(
            <div key={i} style={{padding:"18px 0",borderLeft:i>0?`1px solid ${C.border}`:"none",paddingLeft:i>0?20:0}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:5}}>{item.label}</div>
              <div style={{fontSize:item.hi?20:15,color:item.color||C.text,fontWeight:item.hi?600:300}}>{item.val}</div>
              {item.sub&&<div style={{fontSize:11,color:item.color,marginTop:2}}>{item.sub}</div>}
            </div>
          ))}
        </div>
      </div>

      {stats.length===0?(
        <div style={{textAlign:"center",padding:"80px 24px",color:C.muted}}>
          <div style={{fontSize:40,marginBottom:16}}>◎</div>
          <div>还没有持仓</div>
          <div style={{fontSize:12,marginTop:8}}>填入基金代码、持有金额和持有收益</div>
        </div>
      ):(
        <>
          {/* 图表区 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,margin:"1px 0",background:C.border}}>
            <div style={{background:C.card,padding:"16px 20px"}}>
              <div style={sLabel}>仓位占比</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:120,flexShrink:0}}>
                  <PieChart data={pieData}/>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:5,flex:1,minWidth:0}}>
                  {pieData.map((d,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:5,minWidth:0}}>
                        <span style={{width:6,height:6,borderRadius:1,background:COLORS[i%COLORS.length],flexShrink:0,display:"inline-block"}}/>
                        <span style={{fontSize:10,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</span>
                      </div>
                      <span style={{fontSize:10,color:C.muted,flexShrink:0}}>{totalValue>0?((d.value/totalValue)*100).toFixed(0)+"%":"--"}</span>

                </div>

            </div>
            <div style={{background:C.card,padding:"16px 20px"}}>
              <div style={sLabel}>总资产走势</div>
              {ph.length>1?<LineChart data={ph} color={C.accent}/>:<div style={{height:160,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:11}}>累积数据后显示</div>}
            </div>
          </div>

          {/* 板块分布 */}
          {topTags.length>0&&(
            <div style={{padding:"16px 24px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{...sLabel,marginBottom:10}}>板块分布</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {topTags.map(([tag,val],i)=>(
                  <div key={tag} style={{display:"flex",alignItems:"center",gap:6,background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:"5px 12px"}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:COLORS[i%COLORS.length],flexShrink:0}}/>
                    <span style={{fontSize:11,color:C.text}}>{tag}</span>
                    <span style={{fontSize:10,color:C.muted}}>¥{fmt(val,0)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 持仓列表 */}
          <div style={{padding:"16px 24px 8px",fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase"}}>持仓列表</div>
          {stats.map((f,i)=><Row key={f.id} fund={f} color={COLORS[i%COLORS.length]} onDetail={()=>onDetail(f.id)} onEdit={()=>onEdit(f)} onDel={()=>onDel(f.id)} status={fs[f.id]}/>)}
        </>
      )}
    </div>
  );
}

// ═══════════════════════════ ROW ════════════════════════════════════════════
function Row({fund:f,color,onDetail,onEdit,onDel,status}){
  const isPos=f.holdingProfit>=0,st=status?ST[status]:null;
  return(
    <div style={{borderTop:`1px solid ${C.border}`}}>
      <div style={{padding:"14px 24px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:4,height:40,borderRadius:2,background:color,flexShrink:0}}/>
        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={onDetail}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
            <span style={{fontSize:14}}>{f.name||f.code}</span>
            <span style={{fontSize:10,color:C.muted}}>{f.code}</span>
            <span style={{fontSize:9,padding:"1px 5px",borderRadius:2,background:C.accentDim,color:C.accent}}>{f.type}</span>
            {st&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:2,background:`${st.color}18`,color:st.color}}>{st.label}</span>}
          </div>
          {f.tags&&<div style={{marginBottom:3}}><Tags tags={f.tags} size={9}/></div>}
          <div style={{display:"flex",gap:14}}>
            <span style={{fontSize:11,color:C.muted}}>¥{fmt(f.holdingValue)}</span>
            <span style={{fontSize:11,color:isPos?C.green:C.red,fontWeight:500}}>{fmtPct(f.pnlPct)} · {isPos?"+":""}¥{fmt(f.holdingProfit)}</span>
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:15}}>{fmt(f.currentNav,4)}</div>
          <div style={{fontSize:9,color:C.muted}}>净值</div>
        </div>
        <div style={{display:"flex",gap:5,flexShrink:0}}>
          <button onClick={onEdit} style={iBtn}>✎</button>
          <button onClick={onDel} style={{...iBtn,color:C.red}}>×</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════ DETAIL ════════════════════════════════════════
function Detail({fund:f,onBack,onEdit,fs,onFetch,onAnalysis}){
  const isPos=f.holdingProfit>=0,status=fs?.[f.id],st=status?ST[status]:null;
  const histData=(f.history||[]).filter(h=>h.nav);
  return(
    <div style={{minHeight:"100vh",background:C.bg,paddingBottom:60}}>
      <div style={{padding:"20px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onBack} style={{...iBtn,fontSize:15,padding:"4px 10px"}}>←</button>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:16}}>{f.name}</span>
            {st&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:2,background:`${st.color}18`,color:st.color}}>{st.label}</span>}
          </div>
          <div style={{fontSize:10,color:C.muted,marginTop:2}}>{f.code} · {f.type}</div>
          {f.tags&&<div style={{marginTop:4}}><Tags tags={f.tags}/></div>}
        </div>
        <button onClick={onAnalysis} style={btn(C.gold,"#fff",true)}>✦ 分析</button>
        <button onClick={onFetch} disabled={status==="loading"} style={btn(C.accentDim,C.accent,true,status==="loading")}>{status==="loading"?"…":"⟳"}</button>
        <button onClick={onEdit} style={btn(C.border,C.text,true)}>编辑</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,background:C.border,margin:"1px 0"}}>
        {[
          {label:"总成本",val:`¥${fmt(f.cost)}`},
          {label:"当前市值",val:`¥${fmt(f.holdingValue)}`},
          {label:"持有收益",val:`${f.holdingProfit>=0?"+":""}¥${fmt(f.holdingProfit)}`,color:isPos?C.green:C.red},
          {label:"收益率",val:fmtPct(f.pnlPct),color:isPos?C.green:C.red},
          {label:"当前净值",val:fmt(f.currentNav,4)},
          {label:"今日净值",val:f.history?.slice(-1)[0]?.nav?fmt(f.history.slice(-1)[0].nav,4):"--"},
        ].map((item,i)=>(
          <div key={i} style={{background:C.card,padding:"14px 20px"}}>
            <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:4}}>{item.label}</div>
            <div style={{fontSize:15,fontWeight:500,color:item.color||C.text}}>{item.val}</div>
          </div>
        ))}
      </div>
      <div style={{padding:"20px 24px"}}>
        <div style={sLabel}>净值走势</div>
        {histData.length>1?<LineChart data={histData.map(h=>({date:h.date.slice(5)||h.date,value:h.nav}))} color={C.gold}/>:<div style={{height:140,border:`1px dashed ${C.border}`,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:11}}>自动更新净值后显示走势</div>}
      </div>
      <div style={{margin:"0 24px",padding:16,background:`${C.gold}10`,border:`1px solid ${C.gold}44`,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:13}}>✦ AI 智能分析</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>走势 · 买卖 · 定投 · 做T</div>
        </div>
        <button onClick={onAnalysis} style={btn(C.gold,"#fff",true)}>进入分析</button>
      </div>
    </div>
  );
}

// ═══════════════════════════ AI ANALYSIS ════════════════════════════════════
function Analysis({fund,onBack}){
  const [status,setStatus]=useState("idle");
  const [navList,setNavList]=useState([]);
  const [returns,setReturns]=useState({});
  const [report,setReport]=useState("");
  const [period,setPeriod]=useState("近1年");
  const [navLoading,setNavLoading]=useState(false);
  const periodDays={"近1月":30,"近3月":90,"近6月":180,"近1年":365,"近3年":1095,"建仓以来":null};

  useEffect(()=>{
    if(!fund.code)return;
    setNavLoading(true);
    fetchHistoricalNav(fund.code).then(list=>{setNavList(list);setReturns(calcPeriodReturns(list));setNavLoading(false);}).catch(()=>setNavLoading(false));
  },[fund.code]);

  const chartData=()=>{
    if(!navList.length)return[];
    if(period==="建仓以来")return navList.map(n=>({date:n.date.slice(5),value:n.nav}));
    const days=periodDays[period]||365;
    return navList.slice(-days).map(n=>({date:n.date.slice(5),value:n.nav}));
  };

  const runAnalysis=async()=>{
    if(!navList.length){alert("历史数据未加载完成，请稍候");return;}
    setStatus("loading");setReport("");
    try{const r=await callClaudeAnalysis(fund,returns,navList);setReport(r);setStatus("done");}
    catch(e){setStatus("error");}
  };

  const retColor=v=>v==null?C.muted:v>=0?C.green:C.red;

  return(
    <div style={{minHeight:"100vh",background:C.bg,paddingBottom:80}}>
      <div style={{padding:"20px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,background:C.bg,zIndex:10}}>
        <button onClick={onBack} style={{...iBtn,fontSize:15,padding:"4px 10px"}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontSize:15}}>{fund.name}</div>
          <div style={{fontSize:10,color:C.muted}}>{fund.code} · {fund.type}{fund.tags?` · ${fund.tags}`:""}</div>
        </div>
        <button onClick={runAnalysis} disabled={status==="loading"} style={btn(C.accent,"#fff",true,status==="loading")}>{status==="loading"?"分析中…":"✦ AI 分析"}</button>
      </div>

      {/* 时段收益率 */}
      <div style={{padding:"20px 24px 0"}}>
        <div style={sLabel}>各时段收益率</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:1,background:C.border,borderRadius:6,overflow:"hidden"}}>
          {Object.entries(returns).map(([k,v])=>(
            <div key={k} style={{background:C.card,padding:"12px 8px",textAlign:"center"}}>
              <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{k}</div>
              <div style={{fontSize:13,fontWeight:600,color:retColor(v)}}>{v!=null?fmtPct(v):"--"}</div>
            </div>
          ))}
        </div>
        {navLoading&&<div style={{textAlign:"center",color:C.muted,fontSize:11,marginTop:8}}>加载历史数据中…</div>}
      </div>

      {/* 走势图 */}
      <div style={{padding:"20px 24px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={sLabel}>净值走势</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {["近1月","近3月","近6月","近1年","近3年","建仓以来"].map(p=>(
              <button key={p} onClick={()=>setPeriod(p)} style={{...iBtn,fontSize:10,padding:"3px 8px",background:period===p?C.accent:"transparent",color:period===p?"#fff":C.muted,border:`1px solid ${period===p?C.accent:C.border}`}}>{p}</button>
            ))}
          </div>
        </div>
        {chartData().length>1?<LineChart data={chartData()} color={C.gold}/>:<div style={{height:180,border:`1px dashed ${C.border}`,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:11}}>{navLoading?"加载中…":"暂无数据"}</div>}
      </div>

      {/* 持仓快览 */}
      <div style={{padding:"20px 24px 0"}}>
        <div style={sLabel}>我的持仓</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:C.border,borderRadius:6,overflow:"hidden"}}>
          {[{label:"总成本",val:`¥${fmt(fund.cost)}`},{label:"当前市值",val:`¥${fmt(fund.holdingValue)}`},{label:"持有收益",val:`${fund.holdingProfit>=0?"+":""}¥${fmt(fund.holdingProfit)}`,color:fund.holdingProfit>=0?C.green:C.red}].map((item,i)=>(
            <div key={i} style={{background:C.card,padding:"12px 16px"}}>
              <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{item.label}</div>
              <div style={{fontSize:13,fontWeight:500,color:item.color||C.text}}>{item.val}</div>
            </div>
          ))}
        </div>
      </div>

      {/* AI 报告 */}
      <div style={{padding:"20px 24px"}}>
        {status==="idle"&&(
          <div style={{border:`1px dashed ${C.border}`,borderRadius:8,padding:"40px 24px",textAlign:"center",color:C.muted}}>
            <div style={{fontSize:28,marginBottom:12}}>✦</div>
            <div style={{fontSize:14,marginBottom:6}}>AI 智能分析</div>
            <div style={{fontSize:11,marginBottom:20,lineHeight:1.6}}>基于历史净值数据<br/>分析走势、买卖时机、定投和做T可行性</div>
            <button onClick={runAnalysis} style={{...btn(C.accent,"#fff"),padding:"10px 28px"}}>开始分析</button>
          </div>
        )}
        {status==="loading"&&<div style={{border:`1px solid ${C.border}`,borderRadius:8,padding:"40px 24px",textAlign:"center",color:C.muted,fontSize:11,letterSpacing:2}}>AI 分析中，请稍候…</div>}
        {status==="error"&&<div style={{border:`1px solid ${C.red}22`,borderRadius:8,padding:20,textAlign:"center",color:C.red,fontSize:12}}>分析失败，请重试<br/><button onClick={runAnalysis} style={{...btn(C.red,"#fff",true),marginTop:12}}>重试</button></div>}
        {status==="done"&&report&&(
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={sLabel}>AI 分析报告</div>
              <button onClick={runAnalysis} style={{...iBtn,fontSize:10,color:C.accent}}>重新分析</button>
            </div>
            <div className="ai-report">{report}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════ FORM ════════════════════════════════════════
function Form({form,setForm,onSave,onCancel,isEdit}){
  const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const codeOk=/^\d{6}$/.test(form.code);
  const [fetching,setFetching]=useState(false);

  // 输入代码后自动拉名称和类型
  const handleCodeBlur=async()=>{
    if(!codeOk||form.name)return;
    setFetching(true);
    try{
      const res=await fetchNav(form.code);
      if(res.name){
        const type=detectType(res.name);
        setForm(p=>({...p,name:res.name,type,currentNav:String(res.nav||"")}));
      }
    }catch{}
    setFetching(false);
  };

  const cost=parseFloat(form.holdingValue)-parseFloat(form.holdingProfit||0);
  const pnlPct=cost>0?((parseFloat(form.holdingProfit||0)/cost)*100):0;

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{padding:"24px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onCancel} style={{...iBtn,fontSize:15,padding:"4px 10px"}}>←</button>
        <div style={{fontSize:16}}>{isEdit?"编辑基金":"添加基金"}</div>
      </div>
      <div style={{padding:24,display:"flex",flexDirection:"column",gap:16,maxWidth:480}}>

        {/* 代码 */}
        <div>
          <div style={fLabel}>基金代码</div>
          <input type="text" placeholder="6位数字，如 022365" value={form.code} onChange={set("code")} onBlur={handleCodeBlur} style={inp} maxLength={6}/>
          {form.code&&!codeOk&&<div style={{fontSize:10,color:C.red,marginTop:4}}>请输入6位数字</div>}
          {fetching&&<div style={{fontSize:10,color:C.blue,marginTop:4}}>自动获取基金信息…</div>}
          {codeOk&&form.name&&!fetching&&<div style={{fontSize:10,color:C.green,marginTop:4}}>✓ 已自动识别基金信息</div>}
        </div>

        {/* 名称 */}
        <div>
          <div style={fLabel}>基金名称</div>
          <input type="text" placeholder="输入代码后自动填入" value={form.name} onChange={set("name")} style={inp}/>
        </div>

        {/* 持有金额 + 持有收益 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <div style={fLabel}>持有金额 (¥)</div>
            <input type="number" placeholder="同花顺当前市值" value={form.holdingValue} onChange={set("holdingValue")} style={inp}/>
          </div>
          <div>
            <div style={fLabel}>持有收益 (¥)</div>
            <input type="number" placeholder="盈为正，亏为负" value={form.holdingProfit} onChange={set("holdingProfit")} style={inp}/>
          </div>
        </div>

        {/* 实时预览 */}
        {form.holdingValue&&(
          <div style={{background:C.accentDim,borderRadius:6,padding:"10px 14px",fontSize:11,color:C.accent}}>
            总成本 ¥{fmt(isNaN(cost)?0:cost)} · 收益率 {fmtPct(isNaN(pnlPct)?0:pnlPct)}
          </div>
        )}

        {/* 板块标签 */}
        <div>
          <div style={fLabel}>板块/主题（选填）</div>
          <input type="text" placeholder="如：人工智能, CPO, 黄金" value={form.tags} onChange={set("tags")} style={inp}/>
          <div style={{fontSize:10,color:C.muted,marginTop:4}}>多个标签用逗号分隔</div>
        </div>

        {/* 类型 */}
        <div>
          <div style={fLabel}>基金类型（自动识别，可修改）</div>
          <select value={form.type} onChange={set("type")} style={{...inp,cursor:"pointer"}}>
            {["A股公募","ETF场内","港股基金","美股基金","债券基金","货币基金"].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>

        <div style={{display:"flex",gap:12,marginTop:8}}>
          <button onClick={onSave} style={{...btn(C.accent,"#fff"),flex:1,padding:"12px 0"}}>{isEdit?"保存修改":"添加持仓"}</button>
          <button onClick={onCancel} style={{...btn(C.border,C.muted),flex:1,padding:"12px 0"}}>取消</button>
        </div>
      </div>
    </div>
  );
}

// ─── 样式 ──────────────────────────────────────────────────────────────────
const sLabel={fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:12};
const fLabel={fontSize:10,color:C.muted,letterSpacing:2,marginBottom:6,textTransform:"uppercase"};
const iBtn={background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,padding:"4px 8px",cursor:"pointer",fontSize:13};
const inp={width:"100%",background:C.card,border:`1px solid ${C.border}`,color:C.text,borderRadius:4,padding:"10px 12px",fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box"};
const btn=(bg,color,small,disabled)=>({background:(bg===C.border||bg===C.accentDim)?"transparent":bg,border:`1px solid ${bg===C.accentDim?C.accent:bg}`,color,borderRadius:4,padding:small?"6px 14px":"8px 16px",cursor:disabled?"not-allowed":"pointer",fontSize:small?11:13,fontFamily:"inherit",letterSpacing:1,whiteSpace:"nowrap",opacity:disabled?0.5:1});

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
